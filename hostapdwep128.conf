# WEP 128 WIFI NETWORK (Note, many modern Wi-Fi adapters and operating systems may object to this configuration or be unreliable due to WEP being deprecated).
# SSID = KALIWEP128HOTSPOT
# WEP KEY = 01234567890123456789012345

ieee80211d=1
country_code=IS

interface=wlan0
driver=nl80211
ssid=KALIWEP128HOTSPOT
hw_mode=g
channel=6

# --- Logging (Optional but helpful for testing) ---
logger_syslog=-1
logger_syslog_level=2
logger_stdout=-1
logger_stdout_level=2

# --- WEP Specific Configurations ---
# bit 0 = Open System Authentication, bit 1 = Shared Key Authentication
# WEP requires Shared Key (1) or both allowed (3).
auth_algs=1
macaddr_acl=0

# --- Default Key Index ---
# 0 = wep_key0, 1 = wep_key1, etc.
wep_default_key=0

# --- Pregenerated WEP 128-bit Keys (26 hex characters each) ---
wep_key0=01234567890123456789012345
# wep_key1=9f8e7d6c5b4a3f2e1d0c9b8a7f
# wep_key2=b3c4d5e6f7a8b9c0d1e2f3a4b5
# wep_key3=4e5f6a7b8c9d0e1f2a3b4c5d6e

# --- Broadcast/Rekeying (Fixes legacy client disconnects) ---
# wep_key_len_broadcast=13
# wep_key_len_unicast=13
# wep_rekey_period=300
